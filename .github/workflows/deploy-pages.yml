# Pushes to development/dev run a production build check here.
# Deploy to Netlify is handled by Netlify’s GitHub app (linked repo) — no repo secrets required.
name: Build (Netlify deploys via Git)

on:
  push:
    branches:
      - development
      - dev
  workflow_dispatch:

concurrency:
  group: "netlify-production"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build OK
        run: echo "Build succeeded. Netlify deploys from your linked Git install when this branch is the production branch."
